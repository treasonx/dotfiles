# Installed to /etc/sddm.conf.d/10-noctalia.conf by fix_sddm.
# Do not deploy to $HOME (SDDM reads from /etc, not ~/.config).

[Theme]
Current=noctalia
CursorTheme=catppuccin-mocha-mauve-cursors
Font=Inter

[General]
# DisplayServer=wayland is the modern default on SDDM 0.21+ and matches the
# niri/Hyprland Wayland session. Fall back to x11 here if the Wayland greeter
# misbehaves on first boot (Ctrl+Alt+F3 → edit this file → reboot).
DisplayServer=wayland

[Wayland]
# Wrapper resolves the DRM card with a connected display at each boot, then
# execs weston. Avoids hardcoding --drm-device=cardN, which is unstable across
# reboots and machines. See ~/dotfiles/sddm-weston.
CompositorCommand=/usr/local/libexec/sddm-weston
