# Installed to /etc/sddm.conf.d/10-noctalia.conf by run_once_install-sddm-noctalia.sh.
# Do not deploy to $HOME (SDDM reads from /etc, not ~/.config).

[Theme]
Current=noctalia
CursorTheme=catppuccin-mocha-mauve-cursors
Font=Inter

[General]
# DisplayServer=wayland is the modern default on SDDM 0.21+ and matches the
# niri/Hyprland Wayland session. Fall back to x11 here if the Wayland greeter
# misbehaves on first boot (Ctrl+Alt+F3 → edit this file → reboot).
DisplayServer=wayland
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell

[Wayland]
CompositorCommand=weston --shell=kiosk --xwayland
