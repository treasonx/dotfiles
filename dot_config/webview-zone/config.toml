# webview-zone dashboard config.
#
# Security rules for this file:
# - URLs MUST be https:// (http:// is only allowed for *.local / localhost).
# - URLs MUST NOT contain credentials or tokens in the URL itself. All auth
#   is delegated to cookies that persist in ~/.local/state/webview-zone/profile/.
# - All URLs share one WebKit profile / cookie jar. Only list origins you
#   trust with your session cookies.
#
# Edit then: pkill webview_zone && webview_zone &disown

output      = "HDMI-A-1"
zone_height = 720
geometry    = [3840, 2160]   # fallback match if EDID model doesn't include "HDMI-A-1"

# Optional floating-panel margins (pixels). 0 = flush with output edges.
# Tiled windows lose margin_top pixels of vertical space when > 0; margin
# space is drawn as wallpaper. Configure rounded shadow via the niri
# layer-rule in dot_config/niri/config.kdl.tmpl, not here.
margin_top   = 0
margin_left  = 0
margin_right = 0

# URLs may be bare strings (no zoom) or inline tables with a per-URL
# zoom factor (0.25–5.0). The settings GUI migrates bare strings to the
# inline-table form only when you give a row a non-default zoom.
urls = [
    "https://example.com",
    "https://example.com",
    "https://example.com",
]
