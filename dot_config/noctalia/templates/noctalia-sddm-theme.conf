[General]
# Managed by Noctalia user-template (input: ~/.config/noctalia/templates/noctalia-sddm-theme.conf)
# Do not edit by hand — changes will be overwritten on next Noctalia color/wallpaper change.
# Placeholder syntax matches /etc/xdg/quickshell/noctalia-shell/Assets/Templates/noctalia.json.

# Absolute path to the live wallpaper copy (refreshed by ~/.local/bin/sync_sddm_wallpaper)
background=/var/lib/sddm-noctalia/background.png

# Solid dim overlay opacity (0.0 = no overlay, 1.0 = fully black). A flat
# overlay — no gradient, no blur, so no banding or low-frequency artifacts.
# Tune per taste:
#   0.0 = raw wallpaper
#   0.3 = subtle darkening, wallpaper still prominent
#   0.5 = balanced — recommended starting point
#   0.7 = heavy dim, hides busy/textured wallpapers
#   0.9 = nearly solid black (wallpaper barely visible)
dimOpacity=0.5

# Material Design 3 color tokens — sourced from Noctalia's current palette
mPrimary={{colors.primary.default.hex}}
mOnPrimary={{colors.on_primary.default.hex}}
mSecondary={{colors.secondary.default.hex}}
mOnSecondary={{colors.on_secondary.default.hex}}
mTertiary={{colors.tertiary.default.hex}}
mOnTertiary={{colors.on_tertiary.default.hex}}
mError={{colors.error.default.hex}}
mOnError={{colors.on_error.default.hex}}
mSurface={{colors.surface.default.hex}}
mOnSurface={{colors.on_surface.default.hex}}
mSurfaceVariant={{colors.surface_container.default.hex}}
mOnSurfaceVariant={{colors.on_surface_variant.default.hex}}
mOutline={{colors.outline_variant.default.hex}}
mShadow={{colors.shadow.default.hex}}
mHover={{colors.tertiary.default.hex}}
mOnHover={{colors.on_tertiary.default.hex}}
