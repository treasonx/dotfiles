  # Theme block rendered by Noctalia user-template (lazydocker-theme.yml).
  # Spliced into ~/.config/lazydocker/config.yml between the sentinel markers
  # by ~/.local/bin/sync_lazydocker_theme. Do not edit by hand.
  theme:
    activeBorderColor:
      - '{{colors.primary.default.hex}}'
      - bold
    inactiveBorderColor:
      - '{{colors.outline.default.hex}}'
    selectedLineBgColor:
      - '{{colors.surface_container_high.default.hex}}'
    optionsTextColor:
      - '{{colors.primary.default.hex}}'
    menuBgColor:
      - '{{colors.surface.default.hex}}'
    menuFgColor:
      - '{{colors.on_surface.default.hex}}'
    cherryPickedCommitBgColor:
      - '{{colors.surface_container_highest.default.hex}}'
    cherryPickedCommitFgColor:
      - '{{colors.primary.default.hex}}'
    unstagedChangesColor:
      - '{{colors.error.default.hex}}'
    defaultFgColor:
      - '{{colors.on_surface.default.hex}}'
    searchingActiveBorderColor:
      - '{{colors.tertiary.default.hex}}'
    runningContainerColor:
      - '{{colors.secondary.default.hex}}'
    stoppedContainerColor:
      - '{{colors.error.default.hex}}'
    errorColor:
      - '{{colors.error.default.hex}}'
    warningColor:
      - '{{colors.tertiary.default.hex}}'
    successColor:
      - '{{colors.secondary.default.hex}}'
