# Lazygit theme overlay generated by Noctalia user-template.
# Do not edit by hand — regenerated on every color-scheme change.
# Loaded as a second config file via LG_CONFIG_FILE by ~/.local/bin/lazygit.
# Later files override earlier keys, so this block wins over the Catppuccin
# defaults in ~/.config/lazygit/config.yml.
gui:
  theme:
    activeBorderColor:
      - '{{colors.primary.default.hex}}'
      - bold
    inactiveBorderColor:
      - '{{colors.outline.default.hex}}'
    searchingActiveBorderColor:
      - '{{colors.tertiary.default.hex}}'
    optionsTextColor:
      - '{{colors.primary.default.hex}}'
    selectedLineBgColor:
      - '{{colors.surface_container_high.default.hex}}'
    selectedRangeBgColor:
      - '{{colors.surface_container_high.default.hex}}'
    inactiveViewSelectedLineBgColor:
      - '{{colors.outline_variant.default.hex}}'
    cherryPickedCommitBgColor:
      - '{{colors.surface_container_highest.default.hex}}'
    cherryPickedCommitFgColor:
      - '{{colors.primary.default.hex}}'
    markedBaseCommitFgColor:
      - '{{colors.primary.default.hex}}'
    markedBaseCommitBgColor:
      - '{{colors.tertiary.default.hex}}'
    unstagedChangesColor:
      - '{{colors.error.default.hex}}'
    defaultFgColor:
      - '{{colors.on_surface.default.hex}}'
  authorColors:
    '*': '{{colors.inverse_primary.default.hex}}'
  branchColors:
    'main': '{{colors.primary.default.hex}}'
    'master': '{{colors.primary.default.hex}}'
    'develop': '{{colors.secondary.default.hex}}'
    'feature/*': '{{colors.tertiary.default.hex}}'
    'hotfix/*': '{{colors.error.default.hex}}'
    'release/*': '{{colors.tertiary_fixed_dim.default.hex}}'
